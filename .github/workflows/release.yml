name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run build
      - run: npm test

      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="## [$VERSION]" '
            !found && index($0, ver) == 1 { found=1; next }
            found && /^## \[/             { exit }
            found && /^\[[^]]+\]:/        { exit }
            found                         { print }
          ' CHANGELOG.md > notes.md || true
          [ -s notes.md ] || echo "Release ${GITHUB_REF_NAME} — see [CHANGELOG](https://github.com/Atrakt/beer-color-rgb/blob/main/CHANGELOG.md) for details." > notes.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
